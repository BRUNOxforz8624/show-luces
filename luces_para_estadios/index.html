<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show de Luces - Estadio</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #qr-section {
            margin-bottom: 20px;
        }
        #qr-section img {
            width: 280px;
            height: 280px;
            border: 4px solid #00ff66;
            border-radius: 16px;
            background: white;
            padding: 8px;
        }
        #qr-section p {
            color: #aaa;
            margin: 8px 0 0;
            font-size: 16px;
        }
        button {
            background-color: #00ff66;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff66;
            margin: 10px;
        }
        #estado {
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="qr-section">
        <img id="qr-img" alt="Cargando QR...">
        <p>Escanea con tu teléfono para unirte al show</p>
    </div>

    <h1>¡Bienvenido al Show!</h1>
    <p>Presiona el botón para unirte a la coreografía de luces del estadio.</p>

    <button id="btn-conectar">CONECTAR MI TELÉFONO</button>
    <div id="estado">Esperando conexión...</div>

    <script>
        const url = window.location.href;
        document.getElementById('qr-img').src =
            'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
            encodeURIComponent(url);
    </script>
    <script src="app.js?v=7"></script>
</body>
</html>
